name: Tenant Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tenant-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Fail on banned tenant-id patterns in services
        shell: bash
        run: |
          set -euo pipefail

          if rg -n -i 'x-tenant-id' services/; then
            echo "Found banned tenant header usage under services/."
            exit 1
          fi

          if rg -n -i 'tenant_id.*(headers|query|body)' services/; then
            echo "Found tenant_id derived from client-controlled input under services/."
            exit 1
          fi

          echo "Tenant guardrails passed."
